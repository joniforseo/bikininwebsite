<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Electronic Store | BikininWebsite</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Unique Layout: E-Commerce Grid with Sidebar */
        body { background: #f3f4f6; }
        
        .store-header { background: white; padding: 20px 0; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 100; }
        .store-nav { display: flex; justify-content: space-between; align-items: center; }
        .search-bar { flex: 1; max-width: 500px; margin: 0 40px; position: relative; }
        .search-bar input { width: 100%; padding: 12px 20px; border-radius: 8px; border: 1px solid #d1d5db; background: #f9fafb; }
        .search-bar i { position: absolute; right: 15px; top: 15px; color: #9ca3af; }
        
        .store-layout { display: flex; gap: 30px; padding: 40px 0; }
        .store-sidebar { width: 250px; flex-shrink: 0; }
        .filter-box { background: white; padding: 20px; border-radius: 8px; border: 1px solid #e5e7eb; margin-bottom: 20px; }
        .filter-title { font-weight: 600; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #e5e7eb; }
        
        .store-main { flex: 1; }
        .store-banner { background: #2563eb; color: white; padding: 40px; border-radius: 12px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .store-banner h2 { text-align: left; margin: 0; font-size: 2rem; }
        
        .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .product-card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #e5e7eb; text-align: center; }
        .product-card:first-child { grid-column: 1 / -1; padding: 0; border: none; background: transparent; }
    </style>
</head>
<body>
    <header class="store-header">
        <div class="container store-nav">
            <a href="../index.html" class="logo" style="font-size: 1.2rem; color: #111827;"><i class="fa-solid fa-arrow-left"></i> TechStore Portfolio</a>
            <div class="search-bar">
                <input type="text" placeholder="Search products...">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div style="font-size: 1.5rem; color: #374151;">
                <i class="fa-solid fa-cart-shopping"></i>
            </div>
        </div>
    </header>

    <div class="container store-layout">
        <aside class="store-sidebar">
            <div class="filter-box">
                <div class="filter-title">Kategori</div>
                <div style="display:flex; flex-direction:column; gap:10px; color:#4b5563;">
                    <label><input type="checkbox"> Laptop & PC</label>
                    <label><input type="checkbox"> Smartphone</label>
                    <label><input type="checkbox"> Audio</label>
                    <label><input type="checkbox"> Accessories</label>
                </div>
            </div>
            <div class="filter-box">
                <div class="filter-title">Design Highlights</div>
                <ul style="padding-left:20px; color:#4b5563; font-size:0.9rem;">
                    <li>Clear Product Grid</li>
                    <li>Intuitive Filters</li>
                    <li>Fast Checkout UI</li>
                </ul>
            </div>
        </aside>
        
        <main class="store-main">
            <div class="store-banner">
                <div>
                    <h2>E-Commerce Platform</h2>
                    <p style="color:#bfdbfe; margin-top:10px;">Desain web toko online yang rapi dan terstruktur untuk meningkatkan penjualan.</p>
                </div>
                <a href="#" class="btn" style="background:white; color:#2563eb;">Pesan Sekarang</a>
            </div>
            
            <div class="product-grid">
                <div class="product-card">
                    <img src="../assets/images/portfolio_electronic.png" alt="Electronic Store UI" style="width:100%; border-radius:12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e5e7eb;">
                </div>
                <!-- Dummy products to complete the grid look -->
                <div class="product-card">
                    <div style="height:150px; background:#f3f4f6; border-radius:8px; margin-bottom:15px;"></div>
                    <h4 style="font-size:1rem; margin-bottom:5px;">Wireless Headphones</h4>
                    <span style="color:#2563eb; font-weight:bold;">$299</span>
                </div>
                <div class="product-card">
                    <div style="height:150px; background:#f3f4f6; border-radius:8px; margin-bottom:15px;"></div>
                    <h4 style="font-size:1rem; margin-bottom:5px;">Smart Speaker</h4>
                    <span style="color:#2563eb; font-weight:bold;">$149</span>
                </div>
                <div class="product-card">
                    <div style="height:150px; background:#f3f4f6; border-radius:8px; margin-bottom:15px;"></div>
                    <h4 style="font-size:1rem; margin-bottom:5px;">4K Monitor</h4>
                    <span style="color:#2563eb; font-weight:bold;">$499</span>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
